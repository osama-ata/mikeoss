services:
  minio:
    image: cgr.dev/chainguard/minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-s3-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: cgr.dev/chainguard/minio-client:latest-dev
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >-
      /bin/sh -ec " mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; mc mb --ignore-existing local/${R2_BUCKET_NAME:-mike}; mc anonymous set private local/${R2_BUCKET_NAME:-mike}; "

  supabase-db:
    image: supabase/postgres:17.6.1.084
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "54322:5432"
    volumes:
      - supabase-db17-data:/var/lib/postgresql/data
      - ./supabase/10-init.sh:/docker-entrypoint-initdb.d/10-init.sh:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  supabase-auth:
    image: supabase/gotrue:v2.151.0
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "gotrue", "version"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:8000}
      GOTRUE_SITE_URL: ${FRONTEND_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: ${FRONTEND_URL:-http://localhost:3000}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@supabase-db:5432/postgres?sslmode=disable&search_path=auth
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated

  mike-db-init:
    image: postgres:17.6
    restart: "no"
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SUPABASE_AUTHENTICATOR_PASSWORD: ${SUPABASE_AUTHENTICATOR_PASSWORD:-postgres}
    volumes:
      - ./backend/migrations/000_one_shot_schema.sql:/schema/000_one_shot_schema.sql:ro
    command:
      - sh
      - -ec
      - |
        psql -v ON_ERROR_STOP=1 -h supabase-db -U postgres -d postgres -c "alter role authenticator with login password '$SUPABASE_AUTHENTICATOR_PASSWORD'"
        until psql -h supabase-db -U postgres -d postgres -tAc "select 1 from pg_tables where schemaname = 'auth' and tablename = 'users'" | grep -q 1; do
          sleep 2
        done
        psql -v ON_ERROR_STOP=1 -h supabase-db -U postgres -d postgres -f /schema/000_one_shot_schema.sql

  supabase-rest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "postgrest", "--help"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      PGRST_DB_URI: postgres://authenticator:${SUPABASE_AUTHENTICATOR_PASSWORD:-postgres}@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_SERVER_PORT: 3000

  supabase-kong:
    image: kong:2.8.1
    restart: unless-stopped
    depends_on:
      supabase-auth:
        condition: service_healthy
      supabase-rest:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
    ports:
      - "8000:8000"
    volumes:
      - ./supabase/kong.yml:/home/kong/kong.yml:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      minio-init:
        condition: service_completed_successfully
      mike-db-init:
        condition: service_completed_successfully
      supabase-kong:
        condition: service_started
    environment:
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

      # Point this to the Supabase API URL from the self-hosted stack.
      # If your Supabase Docker stack is running on the same host, keep host.docker.internal.
      SUPABASE_URL: ${SUPABASE_URL:-http://supabase-kong:8000}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}

      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-http://minio:9000}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-minioadmin}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-minioadmin}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-mike}

      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      DOWNLOAD_SIGNING_SECRET: ${DOWNLOAD_SIGNING_SECRET:-}
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://localhost:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      supabase-kong:
        condition: service_started
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY:?NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY must be set}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}

      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-http://minio:9000}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-minioadmin}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-minioadmin}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-mike}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  minio-s3-data:
  supabase-db17-data:
