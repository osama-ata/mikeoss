_format_version: "2.1"

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
        - X-Auth-Token
        - apikey
        - x-client-info
        - x-supabase-api-version
      exposed_headers:
        - Date
        - X-Request-Id
      credentials: true
      max_age: 3600

services:
  - name: auth-v1
    url: http://supabase-auth:9999/
    routes:
      - name: auth-v1-all
        paths:
          - /auth/v1/
        strip_path: true

  - name: rest-v1
    url: http://supabase-rest:3000/
    routes:
      - name: rest-v1-all
        paths:
          - /rest/v1/
        strip_path: true
